<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dux Temp Front End</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #0f172a;
        --panel: #111827;
        --panel-2: #1f2937;
        --text: #e5e7eb;
        --muted: #94a3b8;
        --accent: #22c55e;
        --border: rgba(255, 255, 255, 0.1);
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        background: radial-gradient(circle at top, #1e293b 0%, var(--bg) 55%);
        color: var(--text);
        font-family: Arial, Helvetica, sans-serif;
      }

      main {
        max-width: 1100px;
        margin: 0 auto;
        padding: 32px 16px 48px;
      }

      .shell {
        border: 1px solid var(--border);
        border-radius: 24px;
        overflow: hidden;
        background: rgba(17, 24, 39, 0.9);
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
      }

      .hero {
        padding: 28px;
        border-bottom: 1px solid var(--border);
      }

      .hero h1 {
        margin: 0 0 10px;
        font-size: clamp(2rem, 4vw, 3.5rem);
      }

      .hero p {
        margin: 0;
        color: var(--muted);
        line-height: 1.7;
        max-width: 70ch;
      }

      .grid {
        display: grid;
        gap: 0;
        grid-template-columns: 1fr 1fr;
      }

      @media (max-width: 900px) {
        .grid { grid-template-columns: 1fr; }
      }

      .panel {
        padding: 24px;
      }

      .panel + .panel {
        border-left: 1px solid var(--border);
      }

      @media (max-width: 900px) {
        .panel + .panel { border-left: 0; border-top: 1px solid var(--border); }
      }

      label {
        display: block;
        margin: 0 0 8px;
        font-size: 0.9rem;
        color: var(--muted);
      }

      input, textarea {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 12px 14px;
        background: var(--panel-2);
        color: var(--text);
        outline: none;
      }

      textarea { min-height: 96px; resize: vertical; }

      button {
        border: 0;
        border-radius: 999px;
        padding: 12px 18px;
        background: var(--accent);
        color: #052e16;
        font-weight: 700;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      pre {
        margin: 0;
        min-height: 360px;
        overflow: auto;
        padding: 16px;
        border-radius: 18px;
        background: #020617;
        border: 1px solid var(--border);
        color: #cbd5e1;
        line-height: 1.6;
      }

      .row {
        display: grid;
        gap: 16px;
      }

      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 14px;
        color: var(--muted);
        font-size: 0.9rem;
      }

      .chip {
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid var(--border);
      }

      .error {
        margin-top: 14px;
        padding: 12px 14px;
        border-radius: 14px;
        background: rgba(127, 29, 29, 0.35);
        border: 1px solid rgba(248, 113, 113, 0.3);
        color: #fecaca;
      }

      .notice {
        margin-top: 14px;
        padding: 12px 14px;
        border-radius: 14px;
        background: rgba(245, 158, 11, 0.14);
        border: 1px solid rgba(245, 158, 11, 0.28);
        color: #fde68a;
      }

      .stops {
        display: grid;
        gap: 12px;
        margin-top: 14px;
      }

      .stop {
        padding: 14px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid var(--border);
      }

      .stop strong {
        display: block;
        margin-bottom: 4px;
      }

      .stop-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 8px;
        color: var(--muted);
        font-size: 0.92rem;
      }

      .rating {
        padding: 4px 10px;
        border-radius: 999px;
        background: rgba(34, 197, 94, 0.12);
        color: #86efac;
        border: 1px solid rgba(34, 197, 94, 0.24);
        font-weight: 700;
      }

      .stars {
        letter-spacing: 0.08em;
        white-space: nowrap;
      }

      .debug {
        margin-top: 12px;
        padding: 12px 14px;
        border-radius: 14px;
        background: rgba(59, 130, 246, 0.12);
        border: 1px solid rgba(59, 130, 246, 0.28);
        color: #bfdbfe;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="shell">
        <div class="hero">
          <h1>Dux Temp Front End</h1>
          <p>
            Use this page to test the itinerary API quickly. It posts a destination city,
            available time, and interests, then renders the returned JSON.
          </p>
          <div class="meta">
            <span class="chip">Target: <span id="targetLabel">http://localhost:3002</span></span>
            <span class="chip">Endpoint: /api/itinerary</span>
          </div>
        </div>

        <div class="grid">
          <div class="panel">
            <form id="plannerForm" class="row">
              <div>
                <label for="apiBaseUrl">API Base URL</label>
                <input id="apiBaseUrl" value="http://localhost:3002" placeholder="http://localhost:3002" />
              </div>
              <div>
                <label for="destinationCity">Destination city</label>
                <input id="destinationCity" value="Tokyo" placeholder="Tokyo" />
              </div>
              <div>
                <label for="availableTimeHours">Available time (hours)</label>
                <input id="availableTimeHours" type="number" min="1" max="24" value="8" />
              </div>
              <div>
                <label for="interests">Interests, comma separated</label>
                <textarea id="interests">Food, Nature, Shopping</textarea>
              </div>
              <button id="submitButton" type="submit">Fetch itinerary</button>
              <div id="errorBox" class="error" hidden></div>
            </form>
          </div>

          <div class="panel">
            <pre id="output">Submit the form to see the JSON response here.</pre>
            <div id="sourceNotice" class="notice" hidden></div>
            <div id="stops" class="stops"></div>
          </div>
        </div>
      </section>
    </main>

    <script>
      const form = document.getElementById('plannerForm');
      const apiBaseUrlInput = document.getElementById('apiBaseUrl');
      const destinationCityInput = document.getElementById('destinationCity');
      const availableTimeHoursInput = document.getElementById('availableTimeHours');
      const interestsInput = document.getElementById('interests');
      const submitButton = document.getElementById('submitButton');
      const output = document.getElementById('output');
      const sourceNotice = document.getElementById('sourceNotice');
      // debugBox removed — no provider diagnostics shown when using fallback ratings
      const stops = document.getElementById('stops');
      const errorBox = document.getElementById('errorBox');
      const targetLabel = document.getElementById('targetLabel');

      function showError(message) {
        errorBox.textContent = message;
        errorBox.hidden = false;
      }

      function clearError() {
        errorBox.textContent = '';
        errorBox.hidden = true;
      }

      function clearNotice() {
        sourceNotice.textContent = '';
        sourceNotice.hidden = true;
      }

      function renderStars(rating) {
        const normalized = Math.max(0, Math.min(5, (Number(rating) || 0) / 2));
        const filledStars = Math.round(normalized);
        const emptyStars = 5 - filledStars;

        return `${'★'.repeat(filledStars)}${'☆'.repeat(emptyStars)} ${normalized.toFixed(1)}/5`;
      }

      function getRatingSourceLabel(stop) {
        if (stop.ratingSource === 'reddit') {
          return 'Community';
        }

        return stop.ratingSource === 'fallback' ? 'Estimated' : 'Verified';
      }

      function renderStops(itinerary) {
        stops.innerHTML = '';
        clearNotice();

        if (!itinerary?.stops?.length) {
          return;
        }

        // Ratings are estimated by default; no external provider diagnostics are shown.

        for (const stop of itinerary.stops) {
          const card = document.createElement('article');
          card.className = 'stop';
          const ratingLabel = typeof stop.rating === 'number' ? `Rating: ${renderStars(stop.rating)}` : 'Rating: N/A';
          const sourceLabel = getRatingSourceLabel(stop);
          card.innerHTML = `
            <strong>${stop.name}</strong>
            <div class="stop-meta">
              <span class="rating">${ratingLabel}</span>
              <span class="chip">${sourceLabel}</span>
              <span>${stop.category}</span>
            </div>
            <div class="stop-meta">
              <span>${stop.startTime} - ${stop.endTime}</span>
              <span>Visit: ${stop.estimatedVisitMinutes} min</span>
              <span>Travel next: ${stop.travelTimeToNextMinutes ?? 0} min</span>
            </div>
          `;
          stops.appendChild(card);
        }
      }

      // No diagnostics rendering for external providers when using fallback ratings.

      apiBaseUrlInput.addEventListener('input', () => {
        targetLabel.textContent = apiBaseUrlInput.value || 'http://localhost:3000';
      });

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        clearError();
        submitButton.disabled = true;
        output.textContent = 'Loading...';
        stops.innerHTML = '';

        const payload = {
          destinationCity: destinationCityInput.value.trim(),
          availableTimeHours: Number(availableTimeHoursInput.value),
          interests: interestsInput.value.split(',').map((item) => item.trim()).filter(Boolean)
        };

        try {
          const response = await fetch(`${apiBaseUrlInput.value.replace(/\/$/, '')}/api/itinerary`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });

          const data = await response.json();

          if (!response.ok) {
            throw new Error(data?.error || 'Request failed');
          }

          output.textContent = JSON.stringify(data, null, 2);
          renderStops(data.itinerary);
        } catch (error) {
          output.textContent = 'Request failed.';
          showError(error instanceof Error ? error.message : 'Unknown error');
        } finally {
          submitButton.disabled = false;
        }
      });
    </script>
  </body>
</html>
